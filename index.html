<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Auto en las Montañas</title>

<style>
body{
margin:0;
background:#87CEEB;
overflow:hidden;
font-family:Arial;
text-align:center;
}

canvas{
display:block;
margin:auto;
background:#87CEEB;
}
</style>

</head>
<body>

<h2>🚗 Conduce por las montañas</h2>
<p>⬅️➡️ mover el auto</p>

<canvas id="game" width="1200" height="500"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let keys = {}
let roadOffset = 0

let car = {
x:550,
y:350,
w:120,
h:50
}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

/* montañas */

let mountains=[]

for(let i=0;i<30;i++){

mountains.push({
x:i*200,
height:80 + Math.random()*150
})

}

function update(){

if(keys["ArrowLeft"]) car.x -= 7
if(keys["ArrowRight"]) car.x += 7

if(car.x < 0) car.x = 0
if(car.x > canvas.width-car.w) car.x = canvas.width-car.w

roadOffset += 6

}

/* dibujar montañas */

function drawMountains(){

ctx.fillStyle="#3f704d"

mountains.forEach(m=>{

let x = m.x - (roadOffset % 200)
let y = 300 - m.height

ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x+100,300)
ctx.lineTo(x+200,y)
ctx.fill()

})

}

/* carretera */

function drawRoad(){

ctx.fillStyle="#333"
ctx.fillRect(0,400,1200,100)

ctx.strokeStyle="white"
ctx.lineWidth=6

for(let i=0;i<1200;i+=80){

ctx.beginPath()
ctx.moveTo(i+(roadOffset%80),450)
ctx.lineTo(i+40+(roadOffset%80),450)
ctx.stroke()

}

}

/* auto y muñeco */

function drawCar(){

ctx.fillStyle="red"
ctx.fillRect(car.x,car.y,car.w,car.h)

/* ruedas */

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(car.x+25,car.y+50,12,0,Math.PI*2)
ctx.arc(car.x+95,car.y+50,12,0,Math.PI*2)
ctx.fill()

/* muñequito */

ctx.fillStyle="peachpuff"

ctx.beginPath()
ctx.arc(car.x+60,car.y+15,10,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="black"
ctx.beginPath()
ctx.moveTo(car.x+60,car.y+25)
ctx.lineTo(car.x+60,car.y+40)
ctx.stroke()

}

/* dibujar */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawMountains()
drawRoad()
drawCar()

}

/* loop */

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
