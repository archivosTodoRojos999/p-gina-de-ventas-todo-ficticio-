<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Juego de Casino Ficticio</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #2c3e50;
    color: #ecf0f1;
    margin: 0;
    padding: 20px;
  }

  h1 {
    margin-bottom: 20px;
  }

  #slot {
    font-size: 50px;
    margin: 20px 0;
  }

  .symbol {
    display: inline-block;
    width: 60px;
    height: 60px;
    line-height: 60px;
    margin: 0 10px;
    background-color: #34495e;
    border-radius: 10px;
    font-size: 24px;
  }

  #result {
    font-size: 24px;
    margin-top: 20px;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background-color: #27ae60;
    color: white;
    cursor: pointer;
    margin-top: 20px;
  }

  button:hover {
    background-color: #2ecc71;
  }
</style>
</head>
<body>

<h1>Casino Ficticio</h1>
<p>Tu saldo: <span id="saldo">100</span> créditos</p>

<div id="slot">
  <div class="symbol" id="symbol1">🍒</div>
  <div class="symbol" id="symbol2">🍒</div>
  <div class="symbol" id="symbol3">🍒</div>
</div>

<button id="jugar">¡Jugar!</button>

<div id="result"></div>

<script>
  let saldo = 100;
  const simbolos = ['🍒', '🍋', '🔔', '⭐', '🍀'];

  const saldoSpan = document.getElementById('saldo');
  const resultDiv = document.getElementById('result');

  document.getElementById('jugar').addEventListener('click', () => {
    if (saldo < 10) {
      resultDiv.innerText = 'No tienes suficiente saldo para jugar.';
      return;
    }

    saldo -= 10; // apuesta de 10 créditos
    saldoSpan.innerText = saldo;

    // Generar símbolos aleatorios
    const s1 = simbolos[Math.floor(Math.random() * simbolos.length)];
    const s2 = simbolos[Math.floor(Math.random() * simbolos.length)];
    const s3 = simbolos[Math.floor(Math.random() * simbolos.length)];

    document.getElementById('symbol1').innerText = s1;
    document.getElementById('symbol2').innerText = s2;
    document.getElementById('symbol3').innerText = s3;

    // Comprobar ganancia
    if (s1 === s2 && s2 === s3) {
      // gana
      const ganancia = 50; // premio
      saldo += ganancia;
      saldoSpan.innerText = saldo;
      resultDiv.innerText = '¡Felicidades! Ganaste ' + ganancia + ' créditos.';
    } else {
      resultDiv.innerText = 'Inténtalo de nuevo.';
    }
  });
</script>

</body>
</html>
