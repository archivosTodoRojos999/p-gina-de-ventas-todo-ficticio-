<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GENERADOR DE SENCI SALITA 2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            position: relative;
        }

        .logo {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #f857a6, #ff5858);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(248, 87, 166, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(248, 87, 166, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(248, 87, 166, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(248, 87, 166, 0);
            }
        }

        .logo i {
            font-size: 70px;
            color: white;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #f857a6, #ff5858);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(248, 87, 166, 0.5);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        .theme-selector {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .theme-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .theme-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(248, 87, 166, 0.4);
        }

        .theme-btn.active {
            background: linear-gradient(135deg, #f857a6, #ff5858);
            box-shadow: 0 5px 15px rgba(248, 87, 166, 0.4);
        }

        .device-selector {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .device-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .device-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(248, 87, 166, 0.3);
        }

        .device-card.active {
            background: linear-gradient(135deg, rgba(248, 87, 166, 0.3), rgba(255, 88, 88, 0.3));
            border: 1px solid rgba(248, 87, 166, 0.5);
        }

        .device-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .sensitivity-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .sensitivity-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .sensitivity-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(248, 87, 166, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f857a6, #ff5858);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.5rem;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .slider-container {
            margin-bottom: 20px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>
    <div class="particles"></div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-star"></i>
            </div>
            <h1>GENERADOR DE SENCI SALITA 2.0</h1>
            <div class="subtitle">¡Bienvenido a la plataforma!</div>
        </header>

        <!-- Aquí agregamos la imagen justo debajo del header -->
        <div class="logo-image" style="text-align: center; margin-bottom: 20px;">
            <!-- Reemplaza la ruta por la ruta correcta de tu imagen -->
            <img src="ruta/de/tu/imagen.jpg" alt="Mi Imagen" style="width: 200px; height: auto; border-radius: 10px;">
        </div>

        <!-- Resto de tu contenido... -->

        <div class="theme-selector">
            <button class="theme-btn active">Tema 1</button>
            <button class="theme-btn">Tema 2</button>
            <button class="theme-btn">Tema 3</button>
        </div>

        <div class="device-selector">
            <h2>Selecciona tu dispositivo</h2>
            <div class="device-grid">
                <div class="device-card active">
                    <div class="device-icon"><i class="fas fa-mobile-alt"></i></div>
                    <div class="device-name">Móvil</div>
                </div>
                <div class="device-card">
                    <div class="device-icon"><i class="fas fa-laptop"></i></div>
                    <div class="device-name">Laptop</div>
                </div>
                <div class="device-card">
                    <div class="device-icon"><i class="fas fa-tablet-alt"></i></div>
                    <div class="device-name">Tableta</div>
                </div>
            </div>
        </div>

        <div class="sensitivity-container">
            <div class="sensitivity-card">
                <div class="card-header">
                    <div class="card-icon"><i class="fas fa-bolt"></i></div>
                    <div class="card-title">Sensibilidad 1</div>
                </div>
                <div class="slider-container">
                    <div class="slider-label">
                        <span>Baja</span>
                        <span>Alta</span>
                    </div>
                    <input type="range" min="1" max="100" value="50" class="slider" />
                </div>
            </div>
            <div class="sensitivity-card">
                <div class="card-header">
                    <div class="card-icon"><i class="fas fa-wrench"></i></div>
                    <div class="card-title">Sensibilidad 2</div>
                </div>
                <div class="slider-container">
                    <div class="slider-label">
                        <span>Baja</span>
                        <span>Alta</span>
                    </div>
                    <input type="range" min="1" max="100" value="50" class="slider" />
                </div>
            </div>
        </div>
    </div>
</body>
</html>
