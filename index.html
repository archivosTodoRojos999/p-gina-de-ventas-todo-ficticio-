<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SENCI PRO SALITA</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.panel{
position:relative;
z-index:2;
width:90%;
max-width:350px;
margin:80px auto;
padding:15px;
border:2px solid #00eaff;
box-shadow:0 0 20px #00eaff;
color:#00eaff;
background:#000;
}

input{
width:100%;
padding:10px;
margin:5px 0;
background:#000;
border:1px solid #00eaff;
color:#00eaff;
}

button{
width:32%;
padding:10px;
margin:5px 1%;
background:#000;
border:1px solid #00eaff;
color:#00eaff;
cursor:pointer;
transition:0.3s;
}

button:active{
background:#00eaff;
color:#000;
}

#resultado{
margin-top:10px;
padding:10px;
border:1px solid #00eaff;
}

/* BOTON VIP */
#vipBtn{
position:fixed;
top:50%;
right:10px;
transform:translateY(-50%);
width:65px;
height:65px;
border-radius:50%;
background:#000;
color:#FFD700;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
border:2px solid #FFD700;
box-shadow:0 0 10px #FFD700,0 0 30px #FFD700;
cursor:pointer;
z-index:9999;
animation:brilloVIP 2s infinite;
}

@keyframes brilloVIP{
0%{box-shadow:0 0 10px #FFD700;}
50%{box-shadow:0 0 40px #FFD700;}
100%{box-shadow:0 0 10px #FFD700;}
}

/* PANEL VIP FULL */
#panelVIP{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:red;
z-index:99999;
padding:20px;
overflow:auto;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="panel">
<h3>⚡ SENCI PRO SALITA</h3>

<input id="marca" placeholder="Marca del dispositivo">
<input id="modelo" placeholder="Modelo del dispositivo">

<button onclick="setRango('ALTA')">ALTA</button>
<button onclick="setRango('MEDIA')">MEDIA</button>
<button onclick="setRango('BAJA')">BAJA</button>

<br>

<button onclick="generar(true)">CON DPI</button>
<button onclick="generar(false)">SIN DPI</button>

<div id="resultado">---</div>
</div>

<div id="vipBtn" onclick="abrirVIP()">VIP</div>

<div id="panelVIP">
<div id="vipResultado"></div>
</div>

<script>
let rango="ALTA";

function setRango(r){
rango=r;
}

function generar(dpi){
let marca=document.getElementById("marca").value;
let modelo=document.getElementById("modelo").value;
let resultado=document.getElementById("resultado");

resultado.innerHTML="⏳ Generando...";

setTimeout(()=>{
let base=modelo.length*7;

let sens={
general:190+base,
red:160+base,
x2:140+base,
x4:130+base,
boton:60+base
};

resultado.innerHTML=`
<div style="text-align:center;">🔥 SENCI PRO 🔥</div>
📱 ${marca} - ${modelo}<br>
⚡ ${rango} | ${dpi?"DPI 411":"SIN DPI"}<br><hr>

GENERAL → ${sens.general}<br>

MIRA DE PUNTO ROJO → ${sens.red}<br>

MIRA X2 → ${sens.x2}<br>

MIRA X4 → ${sens.x4}<br>

MIRA FRANCOTIRADOR → ${sens.x4 + 10}<br>

BOTÓN DE CÁMARA 360° → ${sens.boton}<br>

<hr>
🎯 HEADSHOT
`;
},1000);
}

function abrirVIP(){
let u=prompt("Usuario:");
let p=prompt("Clave:");

if(u==="SALITA" && p==="22"){

document.querySelector(".panel").style.display="none";
document.getElementById("vipBtn").style.display="none";

let panelVIP=document.getElementById("panelVIP");
panelVIP.style.display="block";

let vip=document.getElementById("vipResultado");

vip.innerHTML=`
<h2>💀 VIP EXTREMO 💀</h2>

GENERAL: 200<br>
MIRA DE PUNTO ROJO: 180<br>
MIRA X2: 170<br>
MIRA X4: 160<br>
MIRA FRANCOTIRADOR: 190<br>
BOTÓN 360°: 70<br>

<button onclick="cerrarVIP()">SALIR</button>
`;

}else{
alert("Acceso denegado");
}
}

function cerrarVIP(){
document.getElementById("panelVIP").style.display="none";
document.querySelector(".panel").style.display="block";
document.getElementById("vipBtn").style.display="flex";
}

/* PARTICULAS */
let c=document.getElementById("bg");
let ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let dots=[];

for(let i=0;i<50;i++){
dots.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*2,
dx:Math.random()-0.5,
dy:Math.random()-0.5
});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="#00eaff";

dots.forEach(d=>{
ctx.beginPath();
ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
ctx.fill();

d.x+=d.dx;
d.y+=d.dy;

if(d.x<0||d.x>c.width) d.dx*=-1;
if(d.y<0||d.y>c.height) d.dy*=-1;
});

requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
