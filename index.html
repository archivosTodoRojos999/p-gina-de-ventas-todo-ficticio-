<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ENDEX UI Simulation</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
    overflow: hidden;
}

/* Contenedor principal */
.terminal {
    padding: 20px;
    height: 100vh;
}

/* Texto tipo consola */
.line {
    white-space: nowrap;
    overflow: hidden;
    border-right: 2px solid #00ffcc;
    animation: typing 2s steps(40, end), blink 0.8s infinite;
}

/* Animación de escritura */
@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

/* Cursor parpadeando */
@keyframes blink {
    50% { border-color: transparent }
}

/* Efecto glitch */
.glitch {
    color: #ff00ff;
    animation: glitch 0.3s infinite;
}

@keyframes glitch {
    0% { transform: translate(1px, -1px); }
    25% { transform: translate(-1px, 1px); }
    50% { transform: translate(1px, 1px); }
    75% { transform: translate(-1px, -1px); }
    100% { transform: translate(0, 0); }
}

/* Fondo tipo grid neon */
.grid {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: repeating-linear-gradient(
        to top,
        rgba(128,0,255,0.2) 0px,
        rgba(128,0,255,0.2) 2px,
        transparent 2px,
        transparent 20px
    );
    transform: perspective(400px) rotateX(60deg);
}
</style>
</head>

<body>

<div class="terminal" id="terminal"></div>
<div class="grid"></div>

<script>
const lines = [
    "Initializing ENDEX_UI...",
    "Connecting to secure server...",
    "Access granted ✔",
    "Loading modules...",
    "Decrypting data...",
    "System override enabled",
    "WARNING: Unauthorized access detected",
    "Bypassing firewall...",
    "ENDEX CORE ACTIVE"
];

let i = 0;

function typeLine() {
    if (i < lines.length) {
        const div = document.createElement("div");
        div.classList.add("line");

        if (Math.random() > 0.7) {
            div.classList.add("glitch");
        }

        div.textContent = lines[i];
        document.getElementById("terminal").appendChild(div);

        i++;
        setTimeout(typeLine, 1200);
    }
}

typeLine();
</script>

</body>
</html>
