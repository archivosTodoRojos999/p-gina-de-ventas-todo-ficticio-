<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SENCI PRO</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00eaff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Fondo */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* Caja */
.box {
  width: 95%;
  max-width: 340px;
  padding: 15px;
  border: 2px solid #00eaff;
  background: rgba(0,0,0,0.85);
  box-shadow: 0 0 20px #00eaff;
}

/* Inputs MÁS CHICOS */
input {
  width: 100%;
  padding: 8px; /* 🔥 más chico */
  margin-top: 8px;
  background: black;
  border: 1px solid #00eaff;
  color: #00eaff;
  font-size: 14px;
}

/* Botones rango */
.range {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.range button {
  width: 100%;
  padding: 8px;
  border: 1px solid #00eaff;
  background: black;
  color: #00eaff;
}

.range button.active {
  background: #00eaff;
  color: black;
}

/* Panel */
.panel {
  margin-top: 15px;
  border: 1px solid #00eaff;
  padding: 10px;
  font-size: 12px;
  text-align: left;
  box-shadow: 0 0 10px #00eaff inset;
}

/* Botones */
.actions {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.actions button {
  width: 100%;
  padding: 10px;
  border: 1px solid #00eaff;
  background: black;
  color: #00eaff;
}

.actions button:hover {
  background: #00eaff;
  color: black;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">

<h3>⚡ SENCI PRO SALITA</h3>

<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">

<div class="range">
  <button id="alta">ALTA</button>
  <button id="media">MEDIA</button>
  <button id="baja">BAJA</button>
</div>

<div class="panel" id="panel">
=== ESPERANDO DATOS ===
</div>

<div class="actions">
  <button onclick="generar(true)">CON DPI</button>
  <button onclick="generar(false)">SIN DPI</button>
</div>

</div>

<script>
let rango = "";

document.getElementById("alta").onclick = () => select("ALTA");
document.getElementById("media").onclick = () => select("MEDIA");
document.getElementById("baja").onclick = () => select("BAJA");

function select(r) {
  rango = r;
  document.querySelectorAll(".range button").forEach(b=>b.classList.remove("active"));
  document.getElementById(r.toLowerCase()).classList.add("active");
}

function generar(dpi) {
  let marca = document.getElementById("marca").value;
  let modelo = document.getElementById("modelo").value;

  if (!marca || !modelo || !rango) {
    document.getElementById("panel").innerHTML = "⚠️ Completa todo";
    return;
  }

  let base = marca.length * modelo.length;
  let mult = rango === "ALTA" ? 1.1 : rango === "MEDIA" ? 1 : 0.9;

  let sens = {
    general: Math.round((140 + base % 50) * mult),
    red: Math.round((90 + base % 40) * mult),
    x2: Math.round((100 + base % 30) * mult),
    x4: Math.round((110 + base % 20) * mult),
    boton: Math.round((40 + base % 30))
  };

  document.getElementById("panel").innerHTML = `
=== SENCI PRO SALITA ===<br>
RANGO : ${rango}<br>
MODO : ${dpi ? "CON DPI" : "SIN DPI"}<br>
-----------------------<br>
DISPOSITIVO : ${modelo}<br>
MARCA : ${marca}<br>
-----------------------<br>
GENERAL : ${sens.general}%<br>
PUNTO ROJO : ${sens.red}%<br>
MIRA X2 : ${sens.x2}%<br>
MIRA X4 : ${sens.x4}%<br>
BOTON DISP : ${sens.boton}%<br>
DPI : ${dpi ? "411" : "PREDETERMINADO"}
`;
}

/* Fondo azul flúor */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

let lines = Array.from({length:30},()=>({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  angle: Math.random()*6,
  len: 150
}));

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="#00eaff";
  ctx.shadowBlur=15;
  ctx.shadowColor="#00eaff";

  lines.forEach(l=>{
    ctx.beginPath();
    ctx.moveTo(l.x,l.y);
    ctx.lineTo(l.x+Math.cos(l.angle)*l.len, l.y+Math.sin(l.angle)*l.len);
    ctx.stroke();

    l.angle+=0.02;
  });

  requestAnimationFrame(draw);
}
draw();

window.addEventListener("resize", resize);
</script>

</body>
</html>
